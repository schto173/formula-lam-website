services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ecomarathon}
      POSTGRES_USER: ${DB_USER:-ecomarathon}
      POSTGRES_PASSWORD: ${DB_PASS:?set DB_PASS in .env}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecomarathon} -d ${DB_NAME:-ecomarathon}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ecomarathon}:${DB_PASS}@db:5432/${DB_NAME:-ecomarathon}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      UPLOAD_DIR: /app/uploads
      NODE_ENV: production
    volumes:
      - ./data/uploads:/app/uploads
    networks:
      - traefik_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eco-dashboard.rule=Host(`formula.tome.lu`)"
      - "traefik.http.routers.eco-dashboard.entrypoints=websecure"
      - "traefik.http.routers.eco-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.eco-dashboard.loadbalancer.server.port=${APP_PORT:-3000}"

networks:
  traefik_default:
    external: true
